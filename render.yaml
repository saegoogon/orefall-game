services:
  - type: web
    name: neon-duel-arena
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_NAME
        value: Neon Duel Arena
      - key: ADSENSE_CLIENT
        sync: false
